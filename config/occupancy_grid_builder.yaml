occupancy_grid:
  resolution: 0.05        # meters per cell
  align_to_pose_frame: true  # if true, publish grid aligned to robot pose frame (e.g. map)

  cell_values:
    unknown:  -1
    free:      0
    occupied: 100

  # grid bounds; points outside are ignored
  min_x: -10.0
  max_x:  10.0

  min_y: -10.0
  max_y:  10.0
